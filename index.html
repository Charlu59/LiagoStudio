<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liago Studio — Mobile App Development</title>
  <meta name="description" content="Liago Studio conçoit des applications mobiles iOS centrées sur le bien-être, les rituels quotidiens et le changement de comportement.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FAFAF8;
      --fg: #1A1A18;
      --fg-muted: #6B6B65;
      --accent: #E8572A;
      --border: #E5E5E0;
      --serif: 'DM Serif Display', Georgia, serif;
      --sans: 'Instrument Sans', system-ui, sans-serif;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      -webkit-font-smoothing: antialiased;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--fg);
      line-height: 1.65;
      font-size: 16px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      padding: 1.25rem 2.5rem;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: var(--serif);
      font-size: 1.35rem;
      color: var(--fg);
      text-decoration: none;
      letter-spacing: -0.02em;
    }

    .logo span {
      color: var(--accent);
    }

    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 4rem 2rem;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -30%;
      right: -10%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(232, 87, 42, 0.06) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    .hero h1 {
      font-family: var(--serif);
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.03em;
      max-width: 750px;
      margin-bottom: 1.5rem;
      animation: fadeUp 0.8s ease both;
    }

    .hero h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .hero p {
      font-size: 1.125rem;
      color: var(--fg-muted);
      max-width: 520px;
      line-height: 1.7;
      animation: fadeUp 0.8s ease 0.15s both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
      nav { padding: 1rem 1.25rem; }
      .hero { padding: 3rem 1.25rem; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="#" class="logo">Liago<span>.</span></a>
  </nav>
  <section class="hero">
    <h1>Des apps mobiles qui changent les <em>habitudes</em></h1>
    <p>Liago Studio conçoit et publie des applications iOS centrées sur le bien-être, les rituels quotidiens et le changement de comportement durable.</p>
  </section>
</body>
</html>
